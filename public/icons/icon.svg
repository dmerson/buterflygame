<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <rect width="192" height="192" rx="40" fill="#2d6a1f"/>
  <!-- Upper left wing -->
  <ellipse cx="72" cy="72" rx="42" ry="52" transform="rotate(-25 72 72)" fill="#7b5ea7" opacity="0.9"/>
  <!-- Upper right wing -->
  <ellipse cx="120" cy="72" rx="42" ry="52" transform="rotate(25 120 72)" fill="#7b5ea7" opacity="0.9"/>
  <!-- Lower left wing -->
  <ellipse cx="76" cy="118" rx="28" ry="36" transform="rotate(15 76 118)" fill="#9c6dce" opacity="0.9"/>
  <!-- Lower right wing -->
  <ellipse cx="116" cy="118" rx="28" ry="36" transform="rotate(-15 116 118)" fill="#9c6dce" opacity="0.9"/>
  <!-- Wing dots -->
  <circle cx="70" cy="80" r="10" fill="#ffe066" opacity="0.8"/>
  <circle cx="122" cy="80" r="10" fill="#ffe066" opacity="0.8"/>
  <!-- Body -->
  <ellipse cx="96" cy="96" rx="9" ry="38" fill="#3d2b6e"/>
  <!-- Head -->
  <circle cx="96" cy="60" r="10" fill="#3d2b6e"/>
  <!-- Antennae -->
  <line x1="92" y1="52" x2="78" y2="32" stroke="#3d2b6e" stroke-width="3" stroke-linecap="round"/>
  <line x1="100" y1="52" x2="114" y2="32" stroke="#3d2b6e" stroke-width="3" stroke-linecap="round"/>
  <circle cx="78" cy="32" r="5" fill="#9c6dce"/>
  <circle cx="114" cy="32" r="5" fill="#9c6dce"/>
</svg>
